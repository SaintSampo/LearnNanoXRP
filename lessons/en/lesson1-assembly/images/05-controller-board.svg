       ============================================= -->

  <!-- Background -->
  <rect width="800" height="500" fill="#EEF2FF" rx="12"/>

  <!-- Dashed border -->
  <rect x="12" y="12" width="776" height="476" fill="none"
    stroke="#6366F1" stroke-width="2.5"
    stroke-dasharray="14,7" rx="8"/>

  <!-- Camera icon group -->
  <g transform="translate(400, 160)" opacity="0.5">
    <!-- Camera body -->
    <rect x="-40" y="-28" width="80" height="60" rx="8" fill="#6366F1"/>
    <!-- Camera lens -->
    <circle cx="0" cy="12" r="20" fill="white" opacity="0.6"/>
    <circle cx="0" cy="12" r="12" fill="#6366F1" opacity="0.5"/>
    <!-- Camera bump top -->
    <rect x="-12" y="-36" width="24" height="12" rx="4" fill="#6366F1"/>
    <!-- Flash/indicator -->
    <circle cx="26" cy="-18" r="5" fill="#FCD34D" opacity="0.8"/>
  </g>

  <!-- "PHOTO PLACEHOLDER" label -->
  <rect x="280" y="82" width="240" height="28" rx="14" fill="#6366F1" opacity="0.2"/>
  <text x="400" y="101" font-family="Arial, sans-serif" font-size="13" font-weight="700"
    fill="#6366F1" text-anchor="middle" letter-spacing="2">📸  PHOTO PLACEHOLDER</text>

  <!-- Main description text -->
<text x="400" y="248" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#3730A3" text-anchor="middle">XRP Controller Board</text>
<text x="400" y="278" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#3730A3" text-anchor="middle">Mounted on Chassis</text>

  <!-- Sub-description -->
<text x="400" y="326" font-family="Arial, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">Green PCB screwed onto the top of the chassis</text>
<text x="400" y="348" font-family="Arial, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">USB connector visible</text>

  <!-- Replace instruction -->
  <text x="400" y="455" font-family="Arial, sans-serif" font-size="12"
